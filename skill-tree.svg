<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    /* === PATH ENERGY FLOW === */
    @keyframes flowInt {
      0% { stroke-dashoffset: 16; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes flowCre {
      0% { stroke-dashoffset: 16; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes flowSys {
      0% { stroke-dashoffset: 16; }
      100% { stroke-dashoffset: 0; }
    }
    .path-int {
      stroke-dasharray: 8 8;
      animation: flowInt 3s linear infinite;
    }
    .path-cre {
      stroke-dasharray: 8 8;
      animation: flowCre 3.5s linear infinite;
    }
    .path-sys {
      stroke-dasharray: 8 8;
      animation: flowSys 4s linear infinite;
    }
    .path-cross {
      stroke-dasharray: 4 8;
      animation: flowInt 6s linear infinite;
    }

    /* === NODE GLOW PULSE === */
    @keyframes glowAmber { 0%,100%{opacity:.12} 50%{opacity:.28} }
    @keyframes glowCoral { 0%,100%{opacity:.12} 50%{opacity:.28} }
    @keyframes glowTeal  { 0%,100%{opacity:.12} 50%{opacity:.28} }
    @keyframes glowGold  { 0%,100%{opacity:.10} 50%{opacity:.25} }
    .glow-int { animation: glowAmber 3s ease-in-out infinite; }
    .glow-cre { animation: glowCoral 3.5s ease-in-out infinite; }
    .glow-sys { animation: glowTeal 4s ease-in-out infinite; }
    .glow-center { animation: glowGold 2.5s ease-in-out infinite; }

    /* === KEYSTONE EXTRA PULSE === */
    @keyframes keystonePulse { 0%,100%{opacity:.18} 50%{opacity:.40} }
    .keystone-glow-int { animation: keystonePulse 3s ease-in-out infinite; }
    .keystone-glow-cre { animation: keystonePulse 3.5s ease-in-out infinite; }
    .keystone-glow-sys { animation: keystonePulse 4s ease-in-out infinite; }

    /* === CONNECTOR DOT TWINKLE === */
    @keyframes twinkA { 0%,100%{opacity:.25} 50%{opacity:.6} }
    @keyframes twinkB { 0%,100%{opacity:.4} 50%{opacity:.15} }
    @keyframes twinkC { 0%,100%{opacity:.15} 50%{opacity:.5} }
    .dot-a { animation: twinkA 4s ease-in-out infinite; }
    .dot-b { animation: twinkB 5s ease-in-out infinite; }
    .dot-c { animation: twinkC 3.5s ease-in-out infinite; }

    /* === CENTER BREATHING === */
    @keyframes centerBreathe {
      0%,100% { opacity: .06; }
      50% { opacity: .14; }
    }
    .center-aura { animation: centerBreathe 4s ease-in-out infinite; }

    /* === BRANCH LABEL FADE === */
    @keyframes labelFade { 0%,100%{opacity:.35} 50%{opacity:.6} }
    .branch-label { animation: labelFade 5s ease-in-out infinite; }
  </style>

  <!-- Radial gradient from center -->
  <radialGradient id="centerGrad" cx="400" cy="260" r="250" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#FFD93D" stop-opacity=".04"/>
    <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
  </radialGradient>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="400" cy="250" r="400" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity=".3"/>
  </radialGradient>
</defs>

<!-- ============ BACKGROUND ============ -->
<rect width="800" height="500" fill="#0D1117"/>
<rect width="800" height="500" fill="url(#centerGrad)"/>
<rect width="800" height="500" fill="url(#vignette)"/>

